{% extends "layouts/public.html" %}

{% block titulo %}{{ NOME_DO_MANDATO }} — Em construção{% endblock %}

{% block public_conteudo %}
<div style="text-align:center; max-width:520px; margin:48px auto;">
  <div style="width:48px;height:48px;background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-family:var(--font-mono);font-weight:700;font-size:18px;letter-spacing:0.04em;margin:0 auto 28px;">M</div>
  <p style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-mute);margin:0 0 10px;">{{ SIGLA_MANDATO }}</p>
  <h1 style="font-family:var(--font-display);font-weight:600;font-size:var(--text-4xl);letter-spacing:-0.025em;color:var(--ink);margin:0 0 12px;line-height:1.1;">{{ NOME_DO_MANDATO }}</h1>
  <p style="font-family:var(--font-serif);font-size:var(--text-lg);color:var(--ink-body);margin:0 0 40px;font-style:italic;">Em construção.</p>
  <a href="{% url 'accounts:login' %}" class="btn primary">Acesso da equipe →</a>
</div>
{% endblock %}
