{% extends "layouts/app.html" %}

{% block app_conteudo %}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'pessoas:tag_lista' %}" class="text-sm text-slate-500 hover:text-slate-800">← Tags</a>
    <span class="text-slate-300">/</span>
    <h1 class="text-xl font-semibold text-slate-900">{{ titulo }}</h1>
  </div>

  <form method="post" class="bg-white border border-slate-200 rounded-xl p-6 space-y-4" id="tag-form">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Nome *</label>
      {{ form.nome }}
      {% for e in form.nome.errors %}<p class="mt-1 text-xs text-red-600">{{ e }}</p>{% endfor %}
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Categoria *</label>
      {{ form.categoria }}
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Cor</label>
      {{ form.cor }}
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Descrição</label>
      {{ form.descricao }}
    </div>

    <label class="flex items-center gap-2 text-sm text-slate-700">
      {{ form.ativo }} Tag ativa
    </label>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="bg-slate-800 hover:bg-slate-700 text-white text-sm font-medium px-5 py-2 rounded-lg">Salvar</button>
      <a href="{% url 'pessoas:tag_lista' %}" class="text-sm text-slate-500 hover:text-slate-800 px-4 py-2">Cancelar</a>
    </div>
  </form>
</div>

<script>
(function() {
  const form = document.getElementById("tag-form");
  if (!form) return;
  form.querySelectorAll("input[type=text], select, textarea").forEach(el => {
    el.classList.add("w-full", "rounded-lg", "border", "border-slate-300", "px-3", "py-2", "text-sm", "focus:outline-none", "focus:ring-2", "focus:ring-slate-400");
  });
  form.querySelectorAll("input[type=checkbox]").forEach(el => el.classList.add("rounded", "border-slate-300"));
  form.querySelectorAll("input[type=color]").forEach(el => el.classList.add("h-9", "w-16", "rounded", "border", "border-slate-300"));
})();
</script>
{% endblock %}
