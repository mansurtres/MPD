{% extends "layouts/app.html" %}

{% block app_conteudo %}
<div class="max-w-lg">
  <h1 class="text-xl font-semibold text-slate-900 mb-6">Meu perfil</h1>

  <div class="bg-white border border-slate-200 rounded-xl p-6">
    <div class="mb-5 pb-5 border-b border-slate-100">
      <p class="text-sm text-slate-500">E-mail</p>
      <p class="text-sm font-medium text-slate-900 mt-0.5">{{ request.user.email }}</p>
    </div>

    <form method="post" novalidate class="space-y-4">
      {% csrf_token %}

      <div>
        <label for="{{ form.nome_completo.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">
          Nome completo
        </label>
        <input
          type="text"
          name="{{ form.nome_completo.html_name }}"
          id="{{ form.nome_completo.id_for_label }}"
          value="{{ form.nome_completo.value|default:'' }}"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
        >
        {% for erro in form.nome_completo.errors %}
          <p class="mt-1 text-xs text-red-600">{{ erro }}</p>
        {% endfor %}
      </div>

      <div>
        <label for="{{ form.cargo.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">
          Cargo
        </label>
        <input
          type="text"
          name="{{ form.cargo.html_name }}"
          id="{{ form.cargo.id_for_label }}"
          value="{{ form.cargo.value|default:'' }}"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
        >
        {% for erro in form.cargo.errors %}
          <p class="mt-1 text-xs text-red-600">{{ erro }}</p>
        {% endfor %}
      </div>

      <div class="pt-2">
        <button type="submit" class="bg-slate-800 hover:bg-slate-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
          Salvar
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
