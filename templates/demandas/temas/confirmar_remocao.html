{% extends "layouts/app.html" %}

{% block app_conteudo %}
<div class="max-w-lg">
  <h1 class="text-xl font-semibold text-slate-900 mb-4">Remover tema</h1>
  <div class="bg-white border border-slate-200 rounded-xl p-6">
    <p class="text-sm text-slate-700 mb-4">
      Confirma a remoção do tema <strong>{{ object.nome }}</strong>? Demandas que o usavam ficarão sem essa classificação.
    </p>
    <form method="post" class="flex gap-3">
      {% csrf_token %}
      <button type="submit" class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-4 py-2 rounded-lg">Remover</button>
      <a href="{% url 'demandas:tema_lista' %}" class="text-sm text-slate-500 hover:text-slate-800 px-4 py-2">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
