repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 24.4.0
    hooks:
      - id: black

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # Guardrail: comentário {# ... #} do Django SÓ funciona em uma linha. Em
  # multi-linha o `{#` e o conteúdo vazam como texto cru na UI. Bloqueia
  # qualquer linha que abra `{#` sem fechar `#}` na mesma linha.
  - repo: local
    hooks:
      - id: no-multiline-django-comment
        name: Comentario Django {# #} deve ser de uma unica linha
        language: pygrep
        entry: '\{#[^}]*$'
        files: \.html$
        exclude: ^prototipo/
